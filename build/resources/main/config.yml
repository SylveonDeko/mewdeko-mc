# Mewdeko companion plugin configuration

# The WebSocket URL shown when generating a plugin key in the dashboard
api-url: ""

# The per-server plugin API key generated from the dashboard
api-key: ""

# How often to send server status updates (in seconds)
status-interval: 30

# Whether to relay chat messages to Discord
chat-bridge: true

# Whether to send player join/leave events
join-leave-events: true

# Whether to send death messages
death-messages: true

# Whether to send advancement messages
advancement-messages: true

# Whether to stream console log lines
console-streaming: false
